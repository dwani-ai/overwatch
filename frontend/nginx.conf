# Port 80 gateway: React UI + full Overwatch / FastAPI surface (no separate host port for the API).
#
# Use Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass so overwatch-api is
# re-resolved after container recreate. A static ``upstream { server overwatch-api; }`` caches
# the old IP and causes 502 "Host is unreachable" when the API gets a new address.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    client_max_body_size 512m;

    # Re-resolve service name periodically (not at nginx startup only).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $overwatch_api "overwatch-api:8080";

    # --- FastAPI app root (GET /) — SPA owns "/", so expose service JSON here ---
    location = /service {
        proxy_pass http://$overwatch_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # --- API: versioned REST (canonical) ---
    location /v1/ {
        proxy_pass http://$overwatch_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- API: alias for SPA build (VITE_API_BASE=/api → /v1/) ---
    location /api/ {
        proxy_pass http://$overwatch_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- FastAPI OpenAPI & docs (same origin as UI, port 80) ---
    location = /openapi.json {
        proxy_pass http://$overwatch_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    location ^~ /docs {
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
    }

    location ^~ /redoc {
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    # --- UI: static assets + SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
