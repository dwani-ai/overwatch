# Port 80 gateway: React UI + full Overwatch / FastAPI surface (no separate host port for the API).
#
# Use Docker's embedded DNS (127.0.0.11) + a variable host in proxy_pass so overwatch-api is
# re-resolved after container recreate.
#
# IMPORTANT: Do not use ``proxy_pass http://$var/v1/;`` — with a variable host, nginx can drop the
# location suffix and forward ``POST /v1/`` (404). Use ``rewrite ... break`` + ``proxy_pass http://$var``.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    client_max_body_size 512m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $overwatch_api "overwatch-api:8080";

    # Catch mistaken ``POST /api/`` (empty suffix) — would otherwise rewrite to ``POST /v1/``.
    location = /api/ {
        default_type application/json;
        return 400 '{"detail":"Incomplete path under /api/; use e.g. /api/jobs/upload"}';
    }

    # --- API: alias for SPA (VITE_API_BASE=/api → /v1/...) ---
    location /api/ {
        rewrite ^/api/(.*)$ /v1/$1 break;
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- API: versioned REST (pass URI through unchanged) ---
    location /v1/ {
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- FastAPI GET / (service JSON) — SPA owns "/" on this host ---
    location = /service {
        rewrite ^ / break;
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    location = /openapi.json {
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    location ^~ /docs {
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
    }

    location ^~ /redoc {
        proxy_pass http://$overwatch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
