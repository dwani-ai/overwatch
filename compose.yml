services:
  # Optional local GPU vLLM. Default stack uses hosted API (see overwatch-api VLLM_BASE_URL).
  vllm-server:
    profiles: ["local-vllm"]
    image: dwani/vllm-gemma4-audio
    container_name: gemma4-vllm-server-1
    shm_size: "4gb"
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_TOKEN=${HF_TOKEN}
      - LD_LIBRARY_PATH=/usr/local/nvidia/lib:/usr/local/nvidia/lib64
    ports:
      - "10802:10802"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    command: >
      --model google/gemma-4-E4B-it
      --served-model-name gemma4
      --host 0.0.0.0
      --port 10802
      --trust-remote-code
      --enforce-eager
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --max-num-seqs 16
      --enable-chunked-prefill
      --enable-prefix-caching
      --chat-template-content-format openai
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --enable-auto-tool-choice
      --limit-mm-per-prompt '{"image":2,"video":1,"audio":1}'
      --default-chat-template-kwargs '{"enable_thinking": false}'

  overwatch-api:
    build: .
    container_name: overwatch-api
    # API is reached from the host only via overwatch-ui (nginx) on port 80 — /v1/, /api/, /docs, etc.
    environment:
      - DATA_DIR=/data/overwatch
      - INGEST_DIR=/data/ingest
      - VLLM_BASE_URL=${VLLM_BASE_URL}
      - VLLM_MODEL=${VLLM_MODEL:-gemma4}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - VLLM_CHAT_TIMEOUT_SEC=120
      - VLLM_MULTIMODAL_ENABLED=${VLLM_MULTIMODAL_ENABLED:-true}
      - VLLM_MAX_CHUNKS_PER_JOB=${VLLM_MAX_CHUNKS_PER_JOB:-4}
      - VLLM_CHUNK_TIMEOUT_SEC=${VLLM_CHUNK_TIMEOUT_SEC:-600}
      - VLLM_CHUNK_MAX_TOKENS=${VLLM_CHUNK_MAX_TOKENS:-1024}
      - VLLM_SEGMENT_MAX_BYTES=${VLLM_SEGMENT_MAX_BYTES:-18000000}
      - VLLM_VIDEO_SCALE_WIDTH=${VLLM_VIDEO_SCALE_WIDTH:-480}
      - VLLM_SEGMENT_INCLUDE_AUDIO=${VLLM_SEGMENT_INCLUDE_AUDIO:-true}
      - VLLM_JSON_RETRY_MAX=${VLLM_JSON_RETRY_MAX:-2}
      - VLLM_SPECIALIST_MAX_TOKENS=${VLLM_SPECIALIST_MAX_TOKENS:-800}
      - VLLM_AGENT_MAX_TOKENS=${VLLM_AGENT_MAX_TOKENS:-2048}
      - VLLM_AGENT_TIMEOUT_SEC=${VLLM_AGENT_TIMEOUT_SEC:-120}
      - INGEST_POLL_INTERVAL_SEC=5
      - INGEST_STABLE_SEC=2
      - WORKER_POLL_INTERVAL_SEC=1
      - AGENT_WORKER_POLL_INTERVAL_SEC=0.4
    volumes:
      - ./data/ingest:/data/ingest
      - ./data/overwatch:/data/overwatch
    restart: unless-stopped

  overwatch-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: overwatch-ui
    ports:
      - "80:80"
    depends_on:
      - overwatch-api
    restart: unless-stopped
