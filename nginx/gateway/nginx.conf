# Nginx reverse proxy: allowlisted paths only (reduces scanner / bot noise to FastAPI).
# Mount as /etc/nginx/nginx.conf in the gateway container.
#
# Sync the map rules below when you add routes in src/server/main.py.
# Optional: set DISABLE_API_DOCS=1 on the API container so /docs is not served at all.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Per-IP rate limit (tune rate/burst for your traffic)
    limit_req_zone $binary_remote_addr zone=dwani_api_per_ip:10m rate=20r/s;
    limit_req_status 429;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # --- Allowlist: $uri has no query string (matches FastAPI routing) ---
    map "$request_method $uri" $dwani_allowed {
        default 0;

        "~^GET /v1/health$"  1;
        "~^HEAD /v1/health$" 1;
        "~^GET /$"           1;
        "~^HEAD /$"          1;

        "~^POST /v1/transcribe/$"                      1;
        "~^POST /v1/translate_voice/$"                 1;
        "~^POST /detect/$"                             1;
        "~^POST /detect-image/$"                       1;
        "~^POST /v1/audio/speech$"                     1;
        "~^POST /v1/chat/completions$"                 1;
        "~^POST /v1/indic_chat$"                       1;
        "~^POST /v1/chat_direct$"                      1;
        "~^POST /v1/translate$"                        1;
        "~^POST /v1/indic_visual_query$"               1;
        "~^POST /v1/visual_query_direct$"              1;
        "~^POST /v1/speech_to_speech$"                 1;
        "~^POST /v1/extract-text$"                     1;
        "~^POST /v1/extract-text-all$"                 1;
        "~^POST /v1/extract-text-all-chunk$"           1;
        "~^POST /v1/indic-extract-text/$"             1;
        "~^POST /v1/summarize-pdf$"                    1;
        "~^POST /v1/indic-summarize-pdf$"              1;
        "~^POST /app-extract-text$"                    1;
        "~^POST /v1/indic-summarize-pdf-all$"          1;
        "~^POST /v1/custom-prompt-pdf$"                1;
        "~^POST /v1/indic-custom-prompt-pdf$"          1;
        "~^POST /v1/indic-custom-prompt-pdf-all$"      1;
        "~^POST /v1/indic-custom-prompt-kannada-pdf$"  1;
        "~^POST /v1/ocr$"                              1;
        "~^POST /ocr$"                                 1;

        # CORS preflight (tighten to your origins at the app / CDN if possible)
        "~^OPTIONS /v1/"           1;
        "~^OPTIONS /detect/"       1;
        "~^OPTIONS /detect-image/" 1;
        "~^OPTIONS /ocr$"          1;
        "~^OPTIONS /app-extract-text$" 1;
    }

    upstream dwani_upstream {
        server dwani-server:18888;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Drop obvious dotfile probes cheaply (still covered by allowlist)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        if ($dwani_allowed = 0) {
            return 404;
        }

        location / {
            limit_req zone=dwani_api_per_ip burst=100 nodelay;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            proxy_pass http://dwani_upstream;
        }
    }
}
